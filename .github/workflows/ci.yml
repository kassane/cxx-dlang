name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "stable"
          components: rustfmt
      - name: cargo fmt --check (lib)
        run: cargo fmt --check
      - name: cargo fmt --check (examples/demo)
        run: cd examples/demo && cargo fmt --check

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "stable"
          components: clippy

      - name: Install LDC2
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      - name: Cache cargo registry + target
        uses: actions/cache@main
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            examples/demo/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs', '**/*.d') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: cargo clippy (lib)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (lib)
        run: cargo test --tests

      - name: cargo build (lib)
        run: cargo build

      - name: cargo clippy (examples/demo)
        run: cd examples/demo && cargo clippy --all-targets -- -D warnings

      - name: cargo run (examples/demo)
        run: cd examples/demo && cargo run --bin demo
